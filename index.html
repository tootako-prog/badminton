<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🏸 羽球報名系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Teko:wght@600&display=swap" rel="stylesheet"/>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, get }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzfJa5-M2BNd-Uq1eBoLP_dIKXl9YaYtE",
  authDomain: "badminton-b6875.firebaseapp.com",
  databaseURL: "https://badminton-b6875-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "badminton-b6875",
  storageBucket: "badminton-b6875.firebasestorage.app",
  messagingSenderId: "213579206560",
  appId: "1:213579206560:web:dd33c912dda52869c65ec5"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const uid = () => Math.random().toString(36).slice(2,9);

async function dbGet(path) {
  const snap = await get(ref(db, path));
  return snap.exists() ? snap.val() : null;
}
function dbSet(path, val) { return set(ref(db, path), val); }
function dbListen(path, cb) { onValue(ref(db, path), s => cb(s.val())); }

const DEFAULT_EVENTS = [{
  id:"demo1", title:"羽球同樂會", date:"2026-05-20", time:"19:00",
  location:"XX體育館 3號場", maxPlayers:12,
  note:"請自備球拍，球場費 NT$100/人",
  registrations:{}, waitlist:{}, createdAt: Date.now()
}];

(async () => {
  try {
    const existing = await dbGet("events");
    if (!existing) {
      const evMap = {};
      DEFAULT_EVENTS.forEach(e => { evMap[e.id] = e; });
      await dbSet("events", evMap);
      await dbSet("adminPass", "admin123");
    }
    initApp();
  } catch(e) {
    document.getElementById("app").innerHTML =
      `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#ff5f57;font-family:sans-serif">
        <div style="font-size:40px">⚠️</div>
        <div style="font-size:15px">資料庫連線失敗</div>
        <div style="font-size:12px;color:#3a5570;max-width:300px;text-align:center">${e.message}</div>
      </div>`;
  }
})();

function initApp() {
  let state = {
    events:{}, adminPass:"admin123", adminAuth:false,
    view:"events", modal:null,
    lastEventFields: null   // 記住上次新增活動的內容
  };

  dbListen("events",    val => { state.events = val || {}; render(); });
  dbListen("adminPass", val => { if(val) state.adminPass = val; });

  async function mutateEvent(id, fn) {
    const snap = await dbGet(`events/${id}`);
    await dbSet(`events/${id}`, fn(snap));
  }

  async function handleSignup(evId, name) {
    name = name.trim();
    if (!name) return flash("請輸入姓名", false);
    const ev = await dbGet(`events/${evId}`);
    const regs = Object.values(ev.registrations || {});
    const wait = Object.values(ev.waitlist || {});
    if ([...regs,...wait].some(r => r.name === name))
      return flash("此姓名已報名或候補", false);
    const rec = { id:uid(), name, ts:Date.now(), paid:false };
    if (regs.length < ev.maxPlayers) {
      await dbSet(`events/${evId}/registrations/${rec.id}`, rec);
      flash("✅ 報名成功！");
    } else {
      await dbSet(`events/${evId}/waitlist/${rec.id}`, rec);
      flash("✅ 已加入候補！");
    }
    closeModal();
  }

  async function handleWaitlist(evId, name) {
    name = name.trim();
    if (!name) return flash("請輸入姓名", false);
    const ev = await dbGet(`events/${evId}`);
    const regs = Object.values(ev.registrations || {});
    const wait = Object.values(ev.waitlist || {});
    if ([...regs,...wait].some(r => r.name === name))
      return flash("此姓名已報名或候補", false);
    const rec = { id:uid(), name, ts:Date.now(), paid:false };
    await dbSet(`events/${evId}/waitlist/${rec.id}`, rec);
    flash("✅ 已加入候補！");
    closeModal();
  }

  async function handleAdminAdd(evId, name, toList) {
    name = name.trim();
    if (!name) return flash("請輸入姓名", false);
    const ev = await dbGet(`events/${evId}`);
    const regs = Object.values(ev.registrations || {});
    const wait = Object.values(ev.waitlist || {});
    if ([...regs,...wait].some(r => r.name === name))
      return flash("此姓名已存在", false);
    const rec = { id:uid(), name, ts:Date.now(), paid:false };
    if (toList === "reg") {
      await dbSet(`events/${evId}/registrations/${rec.id}`, rec);
      flash(`✅ 已將「${name}」加入報名名單`);
    } else {
      await dbSet(`events/${evId}/waitlist/${rec.id}`, rec);
      flash(`✅ 已將「${name}」加入候補名單`);
    }
  }

  async function handleCancel(evId, recId, fromList) {
    await mutateEvent(evId, ev => {
      const regs = { ...(ev.registrations || {}) };
      const wait = { ...(ev.waitlist || {}) };
      const wasReg = fromList === "reg";
      delete regs[recId];
      delete wait[recId];
      if (wasReg) {
        const waitArr = Object.values(wait).sort((a,b) => a.ts - b.ts);
        if (waitArr.length > 0 && Object.keys(regs).length < ev.maxPlayers) {
          const p = waitArr[0];
          regs[p.id] = p;
          delete wait[p.id];
        }
      }
      return { ...ev, registrations:regs, waitlist:wait };
    });
    flash("已取消報名");
    closeModal();
  }

  async function togglePaid(evId, recId, fromList, newVal) {
    const path = fromList === "reg"
      ? `events/${evId}/registrations/${recId}/paid`
      : `events/${evId}/waitlist/${recId}/paid`;
    await dbSet(path, newVal);
  }

  async function addEvent(f) {
    if (!f.title||!f.date||!f.time) return flash("請填寫必要欄位", false);
    const id = uid();
    await dbSet(`events/${id}`, {
      id, title:f.title, date:f.date, time:f.time,
      location:f.location||"", maxPlayers:parseInt(f.maxPlayers)||16,
      note:f.note||"", registrations:{}, waitlist:{}, createdAt:Date.now()
    });
    state.lastEventFields = { ...f };   // 儲存供下次預填
    flash("活動已新增"); closeModal();
  }

  async function editEvent(id, f) {
    if (!f.title||!f.date||!f.time) return flash("請填寫必要欄位", false);
    await mutateEvent(id, ev => ({
      ...ev, title:f.title, date:f.date, time:f.time,
      location:f.location||"", maxPlayers:parseInt(f.maxPlayers)||16, note:f.note||""
    }));
    flash("已更新"); closeModal();
  }

  async function deleteEvent(id) {
    await dbSet(`events/${id}`, null);
    flash("活動已刪除");
  }

  async function updatePass(p) {
    await dbSet("adminPass", p);
    state.adminPass = p;
    flash("密碼已更新");
  }

  let flashTimer;
  function flash(msg, ok=true) {
    const el = document.getElementById("flash");
    el.textContent = msg;
    el.className = "flash show " + (ok?"ok":"err");
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => el.className="flash", 2600);
  }
  function openModal(type, data={}) { state.modal={type,...data}; render(); }
  function closeModal() { state.modal=null; render(); }

  /* ══ RENDER ══ */
  function render() {
    const appEl = document.getElementById("app");
    const evArr = Object.values(state.events).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    appEl.innerHTML = topbar()
      + `<div class="page">${state.view==="events" ? eventsPage(evArr) : adminPage(evArr)}</div>`
      + (state.modal ? modalOverlay() : "");
    bindEvents();
  }

  function topbar() {
    return `<header class="topbar">
      <div class="logo">🏸 羽球報名</div>
      <nav>
        <button class="nav-btn ${state.view==="events"?"active":""}" data-view="events">活動</button>
        <button class="nav-btn ${state.view==="admin" ?"active":""}" data-view="admin">後台</button>
      </nav>
    </header>`;
  }

  /* ══ 前台 ══ */
  function eventsPage(evArr) {
    if (!evArr.length) return `<div class="empty">目前沒有活動</div>`;
    return evArr.map(eventCard).join("");
  }

  function eventCard(ev) {
    const regs = Object.values(ev.registrations||{}).sort((a,b)=>a.ts-b.ts);
    const wait = Object.values(ev.waitlist||{}).sort((a,b)=>a.ts-b.ts);
    const full = regs.length >= ev.maxPlayers;
    const pct  = Math.min(100, regs.length / ev.maxPlayers * 100);
    const paidCount = regs.filter(r=>r.paid).length;

    return `<div class="card">
      <div class="card-top">
        <h2 class="ev-title">${esc(ev.title)}</h2>
        <span class="badge ${full?"gold":"green"}">${full?"🔶 額滿":"🟢 報名中"}</span>
      </div>
      <div class="meta">
        <span>📅 ${ev.date}</span>
        <span>🕐 ${ev.time}</span>
        ${ev.location?`<span>📍 ${esc(ev.location)}</span>`:""}
      </div>
      <div class="prog-track"><div class="prog-bar ${full?"full":""}" style="width:${pct}%"></div></div>
      <div class="prog-label">
        <span>報名 ${regs.length} / ${ev.maxPlayers}</span>
        <span>候補 ${wait.length} 人</span>
      </div>
      ${ev.note?`<p class="note">${esc(ev.note)}</p>`:""}
      <div class="card-btns">
        <button class="btn-primary" data-action="signup" data-id="${ev.id}">
          ${full?"➕ 加入候補":"✏️ 我要報名"}
        </button>
        <button class="btn-ghost" data-action="cancel-self" data-id="${ev.id}">
          🚪 取消我的報名
        </button>
      </div>

      <!-- 公開名單 + 前台繳費勾選 -->
      <div class="pub-list">
        <div class="pub-list-hd">
          <span>📋 報名名單</span>
          <span class="paid-pill">💛 已繳費 ${paidCount} / ${regs.length}</span>
        </div>
        ${!regs.length
          ? `<div class="empty-sm">尚無人報名，快來搶位！</div>`
          : regs.map((r,i) => `
            <div class="pub-row${r.paid?" pub-paid-row":""}">
              <span class="pub-num">${i+1}</span>
              <span class="pub-name">${esc(r.name)}</span>
              <label class="pub-toggle">
                <input type="checkbox" class="pub-pay-cb"
                  data-evid="${ev.id}" data-recid="${r.id}" data-from="reg"
                  ${r.paid?"checked":""}>
                <span class="pub-tog-wrap">
                  <span class="pub-tog-track"><span class="pub-tog-thumb"></span></span>
                  <span class="pub-tog-lbl">${r.paid?"✅ 已繳費":"未繳費"}</span>
                </span>
              </label>
            </div>`).join("")
        }
        ${wait.length ? `
          <div class="pub-list-hd" style="margin-top:14px"><span>⏳ 候補名單</span></div>
          ${wait.map((r,i)=>`
            <div class="pub-row wait-row">
              <span class="pub-num">候${i+1}</span>
              <span class="pub-name">${esc(r.name)}</span>
              <span class="pub-txt-muted">候補中</span>
            </div>`).join("")}
        ` : ""}
      </div>
    </div>`;
  }

  /* ══ 後台 ══ */
  function adminPage(evArr) {
    if (!state.adminAuth) return `
      <div class="login-box">
        <div style="font-size:44px;margin-bottom:8px">🔐</div>
        <h2>後台登入</h2>
        <input class="inp" type="password" id="admin-pass" placeholder="管理員密碼"/>
        <button class="btn-primary w100" id="admin-login-btn">登入</button>
        <p class="hint">預設密碼：admin123</p>
      </div>`;

    return `
      <div class="admin-hd">
        <div class="sec-title">後台管理</div>
        <button class="btn-primary" data-action="addEvent">＋ 新增活動</button>
      </div>
      ${!evArr.length?`<div class="empty">尚無活動</div>`:""}
      ${evArr.map(adminCard).join("")}
      <div class="card" style="margin-top:20px">
        <div class="sec-title" style="margin-bottom:10px">更改管理員密碼</div>
        <input class="inp" type="password" id="new-pass" placeholder="輸入新密碼" style="margin-bottom:10px"/>
        <button class="btn-primary" id="update-pass-btn">更新密碼</button>
      </div>`;
  }

  function adminCard(ev) {
    const regs = Object.values(ev.registrations||{}).sort((a,b)=>a.ts-b.ts);
    const wait = Object.values(ev.waitlist||{}).sort((a,b)=>a.ts-b.ts);
    const paidCount = regs.filter(r=>r.paid).length;

    return `<div class="card">
      <div class="card-top">
        <div>
          <div style="font-weight:800;font-size:17px">${esc(ev.title)}</div>
          <div class="meta" style="margin-top:4px">${ev.date} ${ev.time}${ev.location?" · "+esc(ev.location):""}</div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button class="btn-ghost sm" data-action="editEvent" data-id="${ev.id}">✏️ 編輯</button>
          <button class="btn-danger sm" data-action="deleteEvent" data-id="${ev.id}">刪除</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <span class="badge green">報名 ${regs.length}/${ev.maxPlayers}</span>
        <span class="badge gold">候補 ${wait.length}</span>
        <span class="badge yellow">已繳費 ${paidCount}/${regs.length}</span>
      </div>
      ${regs.length ? `
        <div class="pay-table">
          <div class="pay-head">
            <span class="col-num">#</span>
            <span class="col-name">姓名</span>
            <span class="col-paid">繳費</span>
            <span class="col-del"></span>
          </div>
          ${regs.map((r,i)=>`
            <div class="pay-row ${r.paid?"row-paid":""}">
              <span class="col-num">${i+1}</span>
              <span class="col-name">${esc(r.name)}</span>
              <span class="col-paid">
                <label class="toggle">
                  <input type="checkbox" class="pay-cb"
                    data-evid="${ev.id}" data-recid="${r.id}" data-from="reg"
                    ${r.paid?"checked":""}>
                  <span class="tog-track"><span class="tog-thumb"></span></span>
                </label>
              </span>
              <span class="col-del">
                <button class="btn-ghost sm icon-btn" data-action="remove"
                  data-evid="${ev.id}" data-recid="${r.id}" data-from="reg">✕</button>
              </span>
            </div>`).join("")}
        </div>
      ` : `<div class="empty-sm" style="margin-top:10px">尚無報名</div>`}
      ${wait.length ? `
        <div class="list-title" style="margin-top:14px">候補名單</div>
        ${wait.map((r,i)=>`
          <div class="list-row">
            <span>候補${i+1}. ${esc(r.name)}</span>
            <button class="btn-ghost sm" data-action="remove"
              data-evid="${ev.id}" data-recid="${r.id}" data-from="wait">✕ 移除</button>
          </div>`).join("")}
      ` : ""}
      <div class="admin-add-box">
        <div class="list-title">➕ 直接追加報名</div>
        <div class="admin-add-row">
          <input class="inp admin-add-inp" id="add-name-${ev.id}" placeholder="輸入姓名" style="margin-bottom:0"/>
          <button class="btn-primary sm" data-action="adminAddReg" data-id="${ev.id}">加入報名</button>
          <button class="btn-ghost sm" data-action="adminAddWait" data-id="${ev.id}">加入候補</button>
        </div>
      </div>
    </div>`;
  }

  /* ── Modals ── */
  function modalOverlay() {
    return `<div class="overlay" id="overlay"><div class="modal-wrap">${modalContent()}</div></div>`;
  }

  function modalContent() {
    const m  = state.modal;
    const ev = m.evId ? state.events[m.evId] : null;

    if (m.type==="signup") {
      const regs = Object.values(ev.registrations||{});
      const full = regs.length >= ev.maxPlayers;
      return `<div class="modal">
        <h3 class="modal-title">${full?"加入候補":"我要報名"}</h3>
        <p class="modal-sub">${esc(ev.title)} · ${ev.date} ${ev.time}</p>
        <label class="lbl">姓名 *</label>
        <input class="inp" id="m-name" placeholder="請輸入姓名" autofocus/>
        <div class="modal-btns">
          ${!full?`<button class="btn-primary f1" id="m-confirm-reg">確認報名</button>`:""}
          <button class="${full?"btn-primary":"btn-ghost"} f1" id="m-confirm-wait">加入候補</button>
        </div>
        <button class="btn-ghost w100 mt8" id="m-close">取消</button>
      </div>`;
    }

    if (m.type==="cancel-self") {
      return `<div class="modal">
        <h3 class="modal-title">取消我的報名</h3>
        <p class="modal-sub">${esc(ev.title)} · ${ev.date} ${ev.time}</p>
        <label class="lbl">輸入你的姓名</label>
        <input class="inp" id="m-query" placeholder="搜尋姓名…" autofocus/>
        <div class="modal-btns" style="margin-top:4px">
          <button class="btn-primary f1" id="m-lookup">查詢</button>
          <button class="btn-ghost f1" id="m-close">關閉</button>
        </div>
        <div id="m-found"></div>
      </div>`;
    }

    if (m.type==="addEvent" || m.type==="editEvent") {
      // 編輯：讀取活動現有資料；新增：沿用上次欄位
      const f = m.type==="editEvent"
        ? (m.f || {})
        : (state.lastEventFields || {});
      return `<div class="modal">
        <h3 class="modal-title">${m.type==="editEvent"?"編輯活動":"新增活動"}</h3>
        <label class="lbl">活動名稱 *</label>
        <input class="inp" id="f-title" value="${esc(f.title||"")}" placeholder="活動名稱"/>
        <div class="two-col">
          <div><label class="lbl">日期 *</label><input class="inp" type="date" id="f-date" value="${f.date||""}"/></div>
          <div><label class="lbl">時間 *</label><input class="inp" type="time" id="f-time" value="${f.time||""}"/></div>
        </div>
        <label class="lbl">地點</label>
        <input class="inp" id="f-location" value="${esc(f.location||"")}" placeholder="體育館名稱"/>
        <label class="lbl">人數上限</label>
        <input class="inp" type="number" id="f-max" value="${f.maxPlayers||16}" min="1"/>
        <label class="lbl">備註</label>
        <textarea class="inp" id="f-note" rows="3" placeholder="費用、注意事項…">${esc(f.note||"")}</textarea>
        <div class="modal-btns" style="margin-top:14px">
          <button class="btn-primary f1" id="m-save">${m.type==="editEvent"?"儲存":"新增"}</button>
          <button class="btn-ghost f1" id="m-close">取消</button>
        </div>
      </div>`;
    }
    return "";
  }

  /* ── Bind ── */
  function bindEvents() {
    document.querySelectorAll(".nav-btn").forEach(b =>
      b.addEventListener("click", () => { state.view=b.dataset.view; render(); }));

    document.getElementById("overlay")?.addEventListener("click", e => {
      if (e.target.id==="overlay") closeModal();
    });

    document.getElementById("admin-login-btn")?.addEventListener("click", () => {
      const p = document.getElementById("admin-pass").value;
      if (p===state.adminPass) { state.adminAuth=true; flash("登入成功"); render(); }
      else flash("密碼錯誤", false);
    });
    document.getElementById("admin-pass")?.addEventListener("keydown", e => {
      if (e.key==="Enter") document.getElementById("admin-login-btn").click();
    });

    document.getElementById("update-pass-btn")?.addEventListener("click", () => {
      const p = document.getElementById("new-pass").value.trim();
      if (p) updatePass(p);
    });

    /* 前台繳費 toggle */
    document.querySelectorAll(".pub-pay-cb").forEach(cb => {
      cb.addEventListener("change", () => {
        // 即時更新旁邊文字，不等 Firebase round-trip
        const lbl = cb.closest(".pub-toggle").querySelector(".pub-tog-lbl");
        if (lbl) lbl.textContent = cb.checked ? "✅ 已繳費" : "未繳費";
        togglePaid(cb.dataset.evid, cb.dataset.recid, cb.dataset.from, cb.checked);
      });
    });

    /* 後台繳費 toggle */
    document.querySelectorAll(".pay-cb").forEach(cb => {
      cb.addEventListener("change", () => {
        togglePaid(cb.dataset.evid, cb.dataset.recid, cb.dataset.from, cb.checked);
      });
    });

    document.querySelectorAll("[data-action]").forEach(b => {
      b.addEventListener("click", () => {
        const a=b.dataset.action, id=b.dataset.id;
        if (a==="signup")      openModal("signup",      { evId:id });
        if (a==="cancel-self") openModal("cancel-self", { evId:id });
        if (a==="addEvent")    openModal("addEvent");
        if (a==="editEvent") {
          const ev = state.events[id];
          openModal("editEvent", {
            evId: id,
            f: {
              title:ev.title, date:ev.date, time:ev.time,
              location:ev.location||"", maxPlayers:ev.maxPlayers, note:ev.note||""
            }
          });
        }
        if (a==="deleteEvent") { if(confirm("確定刪除此活動？")) deleteEvent(id); }
        if (a==="remove") handleCancel(b.dataset.evid, b.dataset.recid, b.dataset.from);
        if (a==="adminAddReg" || a==="adminAddWait") {
          const inp = document.getElementById(`add-name-${id}`);
          const name = inp ? inp.value : "";
          handleAdminAdd(id, name, a==="adminAddReg"?"reg":"wait").then(()=>{ if(inp) inp.value=""; });
        }
      });
    });

    document.getElementById("m-close")?.addEventListener("click", closeModal);
    document.getElementById("m-confirm-reg")?.addEventListener("click", () =>
      handleSignup(state.modal.evId, document.getElementById("m-name").value));
    document.getElementById("m-confirm-wait")?.addEventListener("click", () =>
      handleWaitlist(state.modal.evId, document.getElementById("m-name").value));
    document.getElementById("m-name")?.addEventListener("keydown", e => {
      if (e.key==="Enter")
        (document.getElementById("m-confirm-reg")||document.getElementById("m-confirm-wait")).click();
    });

    function doLookup() {
      const q = document.getElementById("m-query").value.trim();
      if (!q) return;
      const ev   = state.events[state.modal.evId];
      const regs = Object.values(ev.registrations||{});
      const wait = Object.values(ev.waitlist||{});
      const found = [...regs.map(r=>({...r,_l:"reg"})),...wait.map(r=>({...r,_l:"wait"}))]
        .find(r => r.name.includes(q));
      const div = document.getElementById("m-found");
      if (!found) {
        div.innerHTML=`<div class="empty-sm" style="color:#ff5f57;margin-top:10px">查無此人，請確認姓名</div>`;
        return;
      }
      div.innerHTML=`<div class="found-box">
        <div class="found-name">${esc(found.name)}</div>
        <div class="found-status">${found._l==="reg"?"✅ 已報名":"⏳ 候補中"}</div>
        <button class="btn-danger w100" id="m-cancel-btn">確認取消${found._l==="reg"?"報名":"候補"}</button>
      </div>`;
      document.getElementById("m-cancel-btn").addEventListener("click", () =>
        handleCancel(state.modal.evId, found.id, found._l));
    }
    document.getElementById("m-lookup")?.addEventListener("click", doLookup);
    document.getElementById("m-query")?.addEventListener("keydown", e => {
      if (e.key==="Enter") doLookup();
    });

    document.getElementById("m-save")?.addEventListener("click", () => {
      const f = {
        title:      document.getElementById("f-title").value,
        date:       document.getElementById("f-date").value,
        time:       document.getElementById("f-time").value,
        location:   document.getElementById("f-location").value,
        maxPlayers: document.getElementById("f-max").value,
        note:       document.getElementById("f-note").value,
      };
      state.modal.type==="editEvent" ? editEvent(state.modal.evId, f) : addEvent(f);
    });

    document.querySelectorAll(".admin-add-inp").forEach(inp => {
      inp.addEventListener("keydown", e => {
        if (e.key==="Enter") {
          const evId = inp.id.replace("add-name-","");
          handleAdminAdd(evId, inp.value, "reg").then(()=>{ inp.value=""; });
        }
      });
    });
  }

  function esc(s="") {
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  render();
}
</script>

<style>
:root {
  --bg:          #0c1520;
  --panel:       #121f2e;
  --card:        #182637;
  --line:        #1e3048;
  --accent:      #00d68f;
  --gold:        #f5c518;
  --gold-bright: #ffe033;
  --blue:        #4da6ff;
  --danger:      #ff5f57;
  --text:        #dce8f5;
  --sub:         #7a9ab5;
  --muted:       #3a5570;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}

/* topbar */
.topbar{background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;position:sticky;top:0;z-index:100}
.logo{font-family:'Teko',sans-serif;font-size:26px;letter-spacing:2px;color:var(--accent)}
nav{display:flex;gap:6px}
.nav-btn{padding:5px 16px;border-radius:20px;border:none;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;background:transparent;color:var(--sub);transition:all .2s}
.nav-btn.active{background:var(--accent);color:#0c1520}

/* page */
.page{max-width:700px;margin:0 auto;padding:20px 16px 40px}
.sec-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.empty{text-align:center;color:var(--muted);padding:60px 0;font-size:15px}
.empty-sm{font-size:13px;color:var(--muted);padding:6px 0}

/* card */
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:16px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
.ev-title{font-size:20px;font-weight:900}
.meta{display:flex;flex-wrap:wrap;gap:5px 14px;margin-top:9px;font-size:13px;color:var(--sub)}
.note{font-size:13px;color:var(--sub);margin-top:10px}
.prog-track{height:5px;border-radius:99px;background:var(--line);margin-top:14px;overflow:hidden}
.prog-bar{height:100%;background:var(--accent);border-radius:99px;transition:width .5s}
.prog-bar.full{background:var(--gold)}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:5px}
.card-btns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}

/* 前台名單 */
.pub-list{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
.pub-list-hd{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:8px}
.paid-pill{font-size:11px;color:var(--gold-bright);background:#ffe03318;border:1px solid #ffe03344;padding:2px 10px;border-radius:99px}

.pub-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;margin-bottom:3px;border:1px solid transparent;transition:background .25s,border-color .25s}
/* 已繳費那行 → 亮黃背景 */
.pub-paid-row{background:#ffe03314;border-color:#ffe03338 !important}
.wait-row{opacity:.6}
.pub-num{flex:0 0 24px;font-size:11px;color:var(--muted);font-weight:700}
.pub-name{flex:1;font-size:14px;font-weight:600}
.pub-txt-muted{font-size:12px;color:var(--muted)}

/* 前台繳費 toggle */
.pub-toggle{display:inline-flex;align-items:center;cursor:pointer;user-select:none}
.pub-toggle input{display:none}
.pub-tog-wrap{display:inline-flex;align-items:center;gap:7px}
.pub-tog-track{width:36px;height:20px;border-radius:99px;background:var(--line);position:relative;transition:background .22s,box-shadow .22s;flex-shrink:0}
.pub-tog-thumb{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--sub);top:3px;left:3px;transition:transform .22s,background .22s}
.pub-toggle input:checked ~ .pub-tog-wrap .pub-tog-track{background:var(--gold-bright);box-shadow:0 0 10px #ffe03366}
.pub-toggle input:checked ~ .pub-tog-wrap .pub-tog-track .pub-tog-thumb{transform:translateX(16px);background:#0c1520}
.pub-tog-lbl{font-size:12px;font-weight:700;color:var(--muted);transition:color .22s,text-shadow .22s;white-space:nowrap}
.pub-toggle input:checked ~ .pub-tog-wrap .pub-tog-lbl{color:var(--gold-bright);text-shadow:0 0 8px #ffe03377}

/* badges */
.badge{display:inline-flex;align-items:center;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700}
.badge.green{background:#00d68f18;color:var(--accent);border:1px solid #00d68f44}
.badge.gold{background:#f5c51818;color:var(--gold);border:1px solid #f5c51844}
.badge.blue{background:#4da6ff18;color:var(--blue);border:1px solid #4da6ff44}
.badge.yellow{background:#ffe03318;color:var(--gold-bright);border:1px solid #ffe03344}

/* buttons */
.btn-primary,.btn-ghost,.btn-danger{padding:10px 22px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;transition:opacity .15s;border:none}
.btn-primary{background:var(--accent);color:#0c1520}
.btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--line)}
.btn-danger{background:var(--danger);color:#fff}
.btn-primary:hover{opacity:.85}.btn-ghost:hover{background:var(--line)}.btn-danger:hover{opacity:.85}
.sm{padding:5px 12px !important;font-size:12px !important;border-radius:8px !important}
.icon-btn{padding:4px 8px !important}
.w100{width:100%}.mt8{margin-top:8px}.f1{flex:1}

/* inputs */
.inp{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;display:block}
.inp:focus{border-color:var(--accent)}
textarea.inp{resize:vertical}
.lbl{font-size:12px;color:var(--sub);font-weight:700;margin-bottom:5px;display:block}

/* 後台 pay table */
.pay-table{margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.pay-head,.pay-row{display:flex;align-items:center;gap:8px;padding:8px 14px}
.pay-head{background:var(--bg);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;border-bottom:1px solid var(--line)}
.pay-row{border-bottom:1px solid var(--line);font-size:14px;transition:background .15s}
.pay-row:last-child{border-bottom:none}
.pay-row.row-paid{background:#ffe03309}
.col-num{flex:0 0 24px;font-size:12px;color:var(--muted);font-weight:700}
.col-name{flex:1;font-weight:600}
.col-paid{flex:0 0 56px;display:flex;justify-content:center}
.col-del{flex:0 0 36px;display:flex;justify-content:flex-end}

/* 後台 toggle — 亮黃 */
.toggle{position:relative;display:inline-flex;align-items:center;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.tog-track{width:38px;height:20px;background:var(--line);border-radius:99px;position:relative;transition:background .2s,box-shadow .2s}
.tog-thumb{position:absolute;width:14px;height:14px;background:var(--sub);border-radius:50%;top:3px;left:3px;transition:transform .2s,background .2s}
.toggle input:checked ~ .tog-track{background:var(--gold-bright);box-shadow:0 0 10px #ffe03355}
.toggle input:checked ~ .tog-track .tog-thumb{transform:translateX(18px);background:#0c1520}

/* admin */
.admin-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.list-title{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;margin:10px 0 5px}
.list-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--line);font-size:14px}
.admin-add-box{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.admin-add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.admin-add-row .inp{flex:1;min-width:120px;margin-bottom:0}

/* login */
.login-box{max-width:360px;margin:60px auto;padding:28px;background:var(--card);border:1px solid var(--line);border-radius:20px;text-align:center}
.login-box h2{color:var(--accent);margin-bottom:20px;font-size:20px}
.hint{font-size:11px;color:var(--muted);margin-top:12px}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-wrap{width:100%;max-width:440px}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:28px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:800;color:var(--accent);margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--sub);margin-bottom:18px}
.modal-btns{display:flex;gap:10px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.found-box{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:14px}
.found-name{font-weight:700;font-size:16px;margin-bottom:4px}
.found-status{font-size:13px;color:var(--sub);margin-bottom:12px}

/* flash */
.flash{position:fixed;top:-60px;left:50%;transform:translateX(-50%);padding:9px 24px;border-radius:99px;font-weight:700;font-size:13px;z-index:999;white-space:nowrap;pointer-events:none;transition:top .3s ease}
.flash.show{top:14px}
.flash.ok{background:var(--accent);color:#0c1520}
.flash.err{background:var(--danger);color:#fff}

input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.6)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}

@media(max-width:500px){
  .two-col{grid-template-columns:1fr}
  .card-btns,.modal-btns,.admin-add-row{flex-direction:column}
  .admin-add-row .inp{width:100%}
}
</style>
</head>

<div id="flash" class="flash"></div>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;color:#3a5570">
    <div style="font-size:44px">🏸</div>
    <div style="font-family:sans-serif">連接資料庫中…</div>
  </div>
</div>
</body>
</html>
